{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>使用记录</h2>
    <button class="btn btn-outline" onclick="refreshHistory()">🔄 刷新</button>
</div>

<div class="card">
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>请求 ID</th>
                    <th>类型</th>
                    <th>请求内容</th>
                    <th>状态</th>
                    <th>时间</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                <tr>
                    <td colspan="5" class="text-center text-muted">暂无记录</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>输出文件</h3>
    </div>
    <div class="card-body">
        <div id="fileList" class="file-list">
            <p class="text-muted">暂无生成文件</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/history.js"></script>
{% endblock %}
